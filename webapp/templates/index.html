<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organ Segmentation AI — Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --panel:     #161b22;
    --border:    #30363d;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --accent:    #58a6ff;
    --green:     #3fb950;
    --yellow:    #d29922;
    --red:       #f85149;
    --blue-dim:  #1f6feb33;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header .logo {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  header .sub {
    color: var(--muted);
    font-size: 13px;
  }
  header .badge {
    margin-left: auto;
    background: #238636;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* ── Layout ── */
  .main {
    display: grid;
    grid-template-columns: 420px 1fr;
    grid-template-rows: auto 1fr;
    gap: 0;
    height: calc(100vh - 57px);
  }

  /* ── CT Viewer (left column, full height) ── */
  .viewer-panel {
    background: #000;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    grid-row: 1 / 3;
  }
  .viewer-header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .viewer-header span { color: var(--text); font-weight: 600; }
  #ct-image {
    flex: 1;
    object-fit: contain;
    width: 100%;
    display: block;
    background: #000;
  }
  .viewer-controls {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
  }
  .slice-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .slice-row label { font-size: 12px; color: var(--muted); min-width: 70px; }
  input[type=range] {
    flex: 1;
    accent-color: var(--accent);
    cursor: pointer;
  }
  #slice-num {
    font-size: 12px;
    color: var(--accent);
    min-width: 60px;
    text-align: right;
  }
  .window-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .win-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    transition: all .15s;
  }
  .win-btn:hover, .win-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  /* ── Right top: info cards ── */
  .info-bar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .info-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    min-width: 130px;
  }
  .info-card .val {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .info-card .lbl {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ── Organ volume table ── */
  .volumes-panel {
    overflow-y: auto;
    padding: 20px;
  }
  .volumes-panel h2 {
    font-size: 14px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }
  .organ-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .organ-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s;
  }
  .organ-card:hover { border-color: var(--accent); }
  .organ-card .color-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    border-radius: 10px 0 0 10px;
  }
  .organ-card .name {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .organ-card .vol-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .organ-card .vol {
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }
  .organ-card .unit {
    font-size: 13px;
    color: var(--muted);
  }
  .organ-card .range {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }
  .bar-bg {
    background: var(--bg);
    border-radius: 4px;
    height: 5px;
    margin-top: 8px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width .6s ease;
  }
  .status-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status-normal  { background: #1a3a1a; color: var(--green); }
  .status-low     { background: #3a2a1a; color: var(--yellow); }
  .status-high    { background: #3a1a1a; color: var(--red); }
  .status-unknown { background: #1a1f2a; color: var(--muted); }
  .status-info    { background: #1a2a3a; color: var(--accent); }

  /* ── Legend strip ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Loading spinner ── */
  #loading {
    position: absolute;
    inset: 0;
    background: #0008;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .viewer-wrap { position: relative; flex: 1; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">🫁 OrganAI</div>
    <div class="sub">Abdominal CT Segmentation &amp; Volumetry — TotalSegmentator v2.14</div>
  </div>
  <div class="badge">DEMO</div>
</header>

<div class="main">

  <!-- ── LEFT: CT Viewer ── -->
  <div class="viewer-panel">
    <div class="viewer-header">
      CT Viewer &nbsp;·&nbsp; <span id="modality">Axial</span>
      &nbsp;|&nbsp; Window: <span id="win-label">Abdomen</span>
    </div>
    <div class="viewer-wrap">
      <div id="loading"><div class="spinner"></div></div>
      <img id="ct-image" src="" alt="CT Slice" />
    </div>
    <div class="viewer-controls">
      <div class="slice-row">
        <label>Slice</label>
        <input type="range" id="slice-slider"
               min="0" max="{{ n_slices - 1 }}" value="{{ mid_slice }}" step="1">
        <span id="slice-num">{{ mid_slice + 1 }} / {{ n_slices }}</span>
      </div>
      <div class="window-row">
        <span style="font-size:11px;color:var(--muted);margin-right:4px">Window:</span>
        <button class="win-btn active" data-wc="40"   data-ww="400">Abdomen</button>
        <button class="win-btn"       data-wc="60"   data-ww="160">Liver</button>
        <button class="win-btn"       data-wc="-600" data-ww="1500">Lung</button>
        <button class="win-btn"       data-wc="400"  data-ww="1800">Bone</button>
        <button class="win-btn"       data-wc="-60"  data-ww="200">Fat</button>
      </div>
    </div>
  </div>

  <!-- ── RIGHT TOP: Info cards ── -->
  <div class="info-bar">
    <div class="info-card">
      <div class="val" id="info-slices">—</div>
      <div class="lbl">CT Slices</div>
    </div>
    <div class="info-card">
      <div class="val" id="info-voxel">—</div>
      <div class="lbl">Voxel Size (mm)</div>
    </div>
    <div class="info-card">
      <div class="val" id="info-organs">—</div>
      <div class="lbl">Organs Segmented</div>
    </div>
    <div class="info-card">
      <div class="val" id="info-model" style="font-size:13px;padding-top:4px">—</div>
      <div class="lbl">Model</div>
    </div>
  </div>

  <!-- ── RIGHT BOTTOM: Organ Volumes ── -->
  <div class="volumes-panel">
    <h2>Organ Volumes</h2>
    <div class="legend" id="legend"></div>
    <div class="organ-grid" id="organ-grid">
      <div style="color:var(--muted);font-size:13px">Loading...</div>
    </div>
  </div>

</div>

<script>
  let currentSlice = {{ mid_slice }};
  let wc = 40, ww = 400;
  let fetching = false;

  const img       = document.getElementById('ct-image');
  const slider    = document.getElementById('slice-slider');
  const sliceNum  = document.getElementById('slice-num');
  const loading   = document.getElementById('loading');
  const winLabel  = document.getElementById('win-label');
  const totalSlices = {{ n_slices }};

  // ── Load CT slice ──────────────────────────────────────────────────────
  async function loadSlice(z) {
    if (fetching) return;
    fetching = true;
    loading.style.display = 'flex';
    try {
      const res = await fetch(`/api/slice/${z}?wc=${wc}&ww=${ww}`);
      const data = await res.json();
      img.src = 'data:image/png;base64,' + data.image;
      sliceNum.textContent = `${z + 1} / ${totalSlices}`;
    } finally {
      loading.style.display = 'none';
      fetching = false;
    }
  }

  // ── Slider ─────────────────────────────────────────────────────────────
  let sliderTimer = null;
  slider.addEventListener('input', () => {
    currentSlice = parseInt(slider.value);
    sliceNum.textContent = `${currentSlice + 1} / ${totalSlices}`;
    clearTimeout(sliderTimer);
    sliderTimer = setTimeout(() => loadSlice(currentSlice), 80);
  });

  // Mouse wheel on viewer
  document.querySelector('.viewer-wrap').addEventListener('wheel', (e) => {
    e.preventDefault();
    currentSlice = Math.max(0, Math.min(totalSlices - 1,
                            currentSlice + (e.deltaY > 0 ? 1 : -1)));
    slider.value = currentSlice;
    clearTimeout(sliderTimer);
    sliderTimer = setTimeout(() => loadSlice(currentSlice), 60);
  }, { passive: false });

  // ── Window buttons ─────────────────────────────────────────────────────
  document.querySelectorAll('.win-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.win-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      wc = parseInt(btn.dataset.wc);
      ww = parseInt(btn.dataset.ww);
      winLabel.textContent = btn.textContent;
      loadSlice(currentSlice);
    });
  });

  // ── Scan info ──────────────────────────────────────────────────────────
  async function loadInfo() {
    const res  = await fetch('/api/info');
    const data = await res.json();
    document.getElementById('info-slices').textContent  = data.n_slices;
    document.getElementById('info-voxel').textContent   =
      data.voxel_mm.slice(0,3).join(' × ');
    document.getElementById('info-organs').textContent  = data.n_organs;
    document.getElementById('info-model').textContent   = data.model;
  }

  // ── Organ volumes ──────────────────────────────────────────────────────
  async function loadVolumes() {
    const res  = await fetch('/api/volumes');
    const data = await res.json();

    // Legend
    const legend = document.getElementById('legend');
    legend.innerHTML = data.map(o => `
      <div class="legend-item">
        <div class="legend-dot" style="background:${o.color}"></div>
        ${o.label}
      </div>`).join('');

    // Cards
    const grid = document.getElementById('organ-grid');
    grid.innerHTML = data.map(o => {
      const vol = o.volume;
      let pct = 0;
      let barColor = o.color;
      if (o.normal) {
        const [lo, hi] = o.normal;
        pct = Math.min(100, Math.max(0, (vol / hi) * 80));
        if (o.status === 'high') barColor = '#f85149';
        else if (o.status === 'low') barColor = '#d29922';
        else if (o.status === 'normal') barColor = '#3fb950';
      } else {
        pct = vol > 0 ? 50 : 0;
      }

      const statusBadge = o.status !== 'info'
        ? `<span class="status-badge status-${o.status}">${
            o.status === 'unknown' ? 'No data' : o.status}</span>`
        : '';

      return `
      <div class="organ-card">
        <div class="color-bar" style="background:${o.color}"></div>
        <div class="name">${o.label}</div>
        <div class="vol-row">
          <div class="vol" style="color:${o.color}">${vol > 0 ? vol.toFixed(0) : '—'}</div>
          <div class="unit">mL</div>
        </div>
        ${o.normal ? `<div class="range">Normal: ${o.range}</div>` : '<div class="range">Reference range N/A</div>'}
        <div class="bar-bg">
          <div class="bar-fill" style="width:${pct}%;background:${barColor}"></div>
        </div>
        ${statusBadge}
      </div>`;
    }).join('');
  }

  // ── Init ───────────────────────────────────────────────────────────────
  (async () => {
    await Promise.all([loadInfo(), loadVolumes()]);
    await loadSlice(currentSlice);
  })();
</script>
</body>
</html>
