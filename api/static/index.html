<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OrganAI — CT Organ Volumetry</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',system-ui,sans-serif}
  header{padding:18px 28px;border-bottom:1px solid #30363d;background:#161b22}
  header h1{font-size:1.2rem}
  header p{font-size:.8rem;color:#8b949e;margin-top:2px}
  .wrap{max-width:1100px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .panel{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:18px}
  .tabs{display:flex;gap:8px;margin-bottom:16px}
  .tab{flex:1;padding:9px;text-align:center;border-radius:7px;cursor:pointer;font-size:.85rem;font-weight:600;
       background:#0d1117;border:1px solid #30363d;color:#8b949e}
  .tab.active{background:#00a896;color:#03251f;border-color:#00a896}
  .drop{border:2px dashed #30475b;border-radius:10px;padding:32px;text-align:center;cursor:pointer;transition:.2s}
  .drop:hover{border-color:#00a896;background:#0f1c22}
  .drop input{display:none}
  select{width:100%;padding:10px;border-radius:7px;background:#0d1117;color:#e6edf3;border:1px solid #30363d;font-size:.9rem}
  button{background:#00a896;color:#03251f;border:none;border-radius:7px;padding:10px 18px;font-weight:700;cursor:pointer;font-size:.9rem}
  button:disabled{opacity:.5;cursor:default}
  .status{margin-top:14px;font-size:.85rem;color:#8b949e}
  .badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.7rem;font-weight:700}
  .b-normal{background:#0d2a1a;color:#3fb950}.b-high{background:#3d1515;color:#f85149}
  .b-low{background:#3a2a0d;color:#d29922}.b-info{background:#1c2430;color:#8b949e}.b-unknown{background:#1c2430;color:#6e7681}
  #ctimg{width:100%;border-radius:8px;background:#000;display:block}
  .organ{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #21262d}
  .dot{width:12px;height:12px;border-radius:3px;flex:0 0 auto}
  .organ .name{flex:1;font-size:.9rem}
  .organ .vol{font-weight:700}
  .rng{font-size:.72rem;color:#6e7681;margin-left:6px}
  .muted{color:#6e7681;font-size:.8rem}
  input[type=range]{width:100%;margin-top:10px}
  .hidden{display:none}
</style>
</head>
<body>
<header>
  <h1>OrganAI — Abdominal Organ Segmentation & Volumetry</h1>
  <p>Automated CT segmentation → organ volumes with clinical ranges</p>
</header>
<div class="wrap">
  <div class="panel">
    <div class="tabs">
      <div class="tab active" id="tab-live" onclick="switchTab('live')">Live CT — upload</div>
      <div class="tab" id="tab-sample" onclick="switchTab('sample')">Sample CT — instant</div>
    </div>

    <!-- LIVE MODE -->
    <div id="mode-live">
      <label class="drop" id="drop">
        <input type="file" id="file" accept=".nii,.nii.gz">
        <div id="dropText">Drop a CT scan here or click to choose<br><span class="muted">.nii or .nii.gz · segments on demand (~4 min CPU)</span></div>
      </label>
      <div style="margin-top:14px;display:flex;gap:10px;align-items:center">
        <button id="go" disabled>Segment</button>
        <span class="status" id="status">No file selected</span>
      </div>
    </div>

    <!-- SAMPLE MODE -->
    <div id="mode-sample" class="hidden">
      <p class="muted" style="margin-bottom:10px">Pre-segmented demo cases — results load instantly, no upload or wait.</p>
      <select id="sampleSelect"></select>
      <div style="margin-top:14px;display:flex;gap:10px;align-items:center">
        <button id="goSample">Load sample</button>
        <span class="status" id="sampleStatus"></span>
      </div>
    </div>

    <div id="viewer" class="hidden" style="margin-top:18px">
      <img id="ctimg" alt="CT slice">
      <input type="range" id="slider" min="0" value="0">
      <div class="muted" id="sliceLabel"></div>
    </div>
  </div>

  <div class="panel">
    <h3 style="font-size:1rem;margin-bottom:10px">Organ Volumes</h3>
    <div id="meta" class="muted">Choose a CT to see results.</div>
    <div id="organs" style="margin-top:10px"></div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);
let file=null, jobId=null, nSlices=0;

function switchTab(mode){
  $("#tab-live").classList.toggle("active", mode==="live");
  $("#tab-sample").classList.toggle("active", mode==="sample");
  $("#mode-live").classList.toggle("hidden", mode!=="live");
  $("#mode-sample").classList.toggle("hidden", mode!=="sample");
}

// ---- Sample mode ----
async function loadSampleList(){
  const r=await fetch("/api/samples"); const list=await r.json();
  const sel=$("#sampleSelect");
  if(!list.length){ sel.innerHTML='<option>(no samples configured)</option>'; $("#goSample").disabled=true; return; }
  sel.innerHTML=list.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");
}
$("#goSample").addEventListener("click", async ()=>{
  jobId=$("#sampleSelect").value;
  $("#sampleStatus").textContent="Loading…";
  const r=await fetch(`/api/jobs/${jobId}`); const j=await r.json();
  if(j.status==="done"){ $("#sampleStatus").textContent="Loaded ✓"; render(j); }
  else { $("#sampleStatus").textContent="Error: "+(j.error||j.status); }
});

// ---- Live mode ----
$("#file").addEventListener("change", e=>{
  file=e.target.files[0];
  if(file){ $("#dropText").innerHTML=file.name; $("#go").disabled=false; $("#status").textContent="Ready to segment"; }
});
$("#go").addEventListener("click", async ()=>{
  if(!file) return;
  $("#go").disabled=true; $("#status").textContent="Uploading…";
  const fd=new FormData(); fd.append("file", file);
  const r=await fetch("/api/jobs",{method:"POST",body:fd});
  if(!r.ok){ $("#status").textContent="Error: "+(await r.json()).detail; $("#go").disabled=false; return; }
  jobId=(await r.json()).id;
  $("#status").textContent="Segmenting… (a few minutes on CPU)";
  poll();
});
async function poll(){
  const r=await fetch(`/api/jobs/${jobId}`); const j=await r.json();
  if(j.status==="done"){ $("#status").textContent="Done ✓"; render(j); }
  else if(j.status==="error"){ $("#status").textContent="Error: "+j.error; $("#go").disabled=false; }
  else { setTimeout(poll, 3000); }
}

// ---- Shared render ----
function render(j){
  nSlices=j.n_slices;
  $("#meta").innerHTML=`Shape ${j.shape.join("×")} · voxel ${j.voxel_mm.join("×")} mm · ${j.n_masks} structures · ${j.model}`;
  $("#organs").innerHTML=j.organs.map(o=>`
    <div class="organ">
      <span class="dot" style="background:${o.color}"></span>
      <span class="name">${o.label}<span class="rng">${o.range}</span></span>
      <span class="vol">${o.volume} mL</span>
      <span class="badge b-${o.status}">${o.status}</span>
    </div>`).join("");
  const sl=$("#slider"); sl.max=nSlices-1; sl.value=Math.floor(nSlices/2);
  $("#viewer").classList.remove("hidden");
  sl.oninput=()=>loadSlice(sl.value);
  loadSlice(sl.value);
}
async function loadSlice(z){
  $("#sliceLabel").textContent=`Slice ${(+z)+1} / ${nSlices}`;
  const r=await fetch(`/api/jobs/${jobId}/slice/${z}`); const j=await r.json();
  if(j.image) $("#ctimg").src="data:image/png;base64,"+j.image;
}

loadSampleList();
</script>
</body>
</html>
